name: Monitor Trafikverket Slots

on:
  # Allow manual trigger
  workflow_dispatch:
  
  # Allow external trigger via repository_dispatch (used by cron-job.org)
  repository_dispatch:
    types: [trigger-monitor]

# Prevent concurrent runs - cancel in-progress if new one starts
concurrency:
  group: trafikverket-monitor
  cancel-in-progress: true

jobs:
  check-slots:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      
      - name: Restore session from secret
        env:
          SESSION_DATA: ${{ secrets.SESSION_DATA }}
        run: |
          mkdir -p data
          if [ -n "$SESSION_DATA" ]; then
            echo "$SESSION_DATA" | base64 -d > data/session.json
            echo "✅ Session restored from GitHub Secret"
            echo "Session file size: $(wc -c < data/session.json) bytes"
            # Verify it's valid JSON
            if python3 -c "import json; json.load(open('data/session.json'))"; then
              echo "✅ Session file is valid JSON"
            else
              echo "❌ Session file is NOT valid JSON"
              cat data/session.json
            fi
          else
            echo "❌ No SESSION_DATA secret found - session will expire!"
          fi
      
      - name: Restore previous slots
        uses: actions/cache@v4
        with:
          path: data/previous_slots.json
          key: slots-${{ github.run_id }}
          restore-keys: |
            slots-
      
      - name: Run slot monitor
        env:
          BOOKING_URL: ${{ secrets.BOOKING_URL }}
          LOCATION: ${{ secrets.LOCATION }}
          LOCATIONS: ${{ secrets.LOCATIONS }}
          CHECK_BEFORE_DATE: "2026-06-13"
          NOTIFY_BEFORE_DATE: "2026-06-13"
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/main.py --debug --always-notify --before-date 2026-06-13 || true
      
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            data/*.png
            data/*.json
            data/*.html
          retention-days: 7
      
      - name: Save slots cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/previous_slots.json
          key: slots-${{ github.run_id }}
